<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Log Decoder</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
filter:blur(1.3px);
image-rendering:pixelated;
}

/* VHS overlay */

#vhs{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.05) 0px,
rgba(255,255,255,0.05) 1px,
transparent 2px,
transparent 4px
);
}

/* UI */

#ui{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

button{
background:#111;
color:white;
border:1px solid #444;
margin:8px;
padding:6px 12px;
font-family:monospace;
cursor:pointer;
}

/* TEXT */

#text{
position:absolute;
top:140px;
left:20px;
width:70%;
font-size:12px;
line-height:18px;
white-space:pre-wrap;
transform:scaleY(1.5);
transform-origin:top left;
z-index:10;
}

/* SECRET BUTTON */

#secret{
position:fixed;
bottom:30px;
right:30px;
width:200px;
height:90px;
background:#111;
border:1px solid #777;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transform:scaleY(2);
z-index:10;
}

#secret span{
animation:flicker 0.2s infinite;
}

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}
